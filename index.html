<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My GitHub Pages Site</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<script>
    window.onload = function() {
        // This is the URL to your PythonAnywhere API
        const apiURL = 'https://asleepyfox.pythonanywhere.com';

        fetch(apiURL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                url: window.location.href,
                timestamp: new Date().toISOString()
            })
        })
        .then(response => {
            if (response.ok) {
                console.log('Page view tracked successfully!');
            }
        })
        .catch(error => {
            console.error('Tracking failed:', error);
        });
    };
</script>
<body>
  <header class="site-header">
    <h1>Welcome to My Site</h1>
    <p class="tagline">A simple GitHub Pages starter</p>
  </header>

  <main class="content">
    <section>
      <h2>About</h2>
      <p>This is a minimal static site. Edit <code>index.html</code> and <code>styles.css</code> to customize it.</p>
    </section>

    <section>
      <h2>Contact</h2>
      <p>Email: <a href="mailto:you@example.com">you@example.com</a></p>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Your Name</p>
  </footer>

  <script>
    // simple script to set current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
